fastslam_node:
  ros__parameters:
    num_particles: 10
    map_width: 500
    map_height: 500
    map_res: 0.05
    ray_skip: 2
    a1: 0.001
    a2: 0.001
    a3: 0.001
    a4: 0.001
    scan_match_x_range: 0.1 
    scan_match_y_range: 0.1
    scan_match_theta_range: 0.5236
    scan_match_step_xy: 0.01
    scan_match_step_theta: 0.0175
    z_hit: 0.90
    std_hit: 0.2
    z_rand: 0.05
    linear_update: 0.5
    angular_update: 0.2
    resample_threshold: 0.5
    use_sim_time: true 

