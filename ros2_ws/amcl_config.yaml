amcl:
  ros__parameters:
    use_sim_time: true
    set_initial_pose: false
    # Filter parameters
    min_particles: 5000  # More particles!
    max_particles: 10000
    
    # Laser model
    laser_model_type: "likelihood_field"
    z_hit: 0.95
    z_rand: 0.05
    sigma_hit: 0.2
    max_beams: 60
    laser_max_range: 100.0
    
    # Motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Update thresholds
    update_min_d: 0.1
    update_min_a: 0.1
    
    # Initial pose
    set_initial_pose: false
    
    # TF frames
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    
    # Transform
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0