fastslam_node:
  ros__parameters:
    num_particles: 10
    map_chunk_size: 24.0
    map_res: 0.05
    ray_skip: 5
    a1: 0.05
    a2: 0.01
    a3: 0.01
    a4: 0.01
    z_hit: 0.90
    std_hit: 0.2
    z_rand: 0.05
    linear_update: 0.5
    angular_update: 0.2
    resample_threshold: 0.5
    use_sim_time: true 

fastslam2_node:
  ros__parameters:
    num_particles: 6
    map_chunk_size: 5.0
    map_res: 0.02
    ray_skip: 5
    a1: 0.05
    a2: 0.01
    a3: 0.01
    a4: 0.01
    scan_match_x_range: 0.1 
    scan_match_y_range: 0.1
    scan_match_theta_range: 0.5236 # PI/6
    scan_match_step_xy: 0.025
    scan_match_step_theta: 0.0175 # ~1 degs 
    z_hit: 0.80
    std_hit: 0.02
    z_rand: 0.2
    linear_update: 0.1
    angular_update: 0.05
    resample_threshold: 0.5
    use_sim_time: true 


